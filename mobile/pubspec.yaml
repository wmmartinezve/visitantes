name: visitantes_mobile
description: App móvil Visitantes · Anzoátegui — Anfitrión y Centro de Acopio con soporte offline.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  url_launcher: ^6.3.1
  flutter_image_compress: ^2.4.0
  device_info_plus: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/visitantes_icon.png
